customCommands:
  - key: "<c-a>"
    context: "files"
    command: 'git commit -m "{{.Form.Msg}}"'
    loadingText: "Generating commit message with AI..."
    prompts:
      - type: "menuFromCommand"
        title: "AI Commits"
        key: "Msg"
        command: "generate-commit-message"
        filter: '^(?P<number>\d+)\.\s(?P<message>.+)$'
        valueFormat: "{{ .message }}"
        labelFormat: "{{ .number }}: {{ .message | green }}"

